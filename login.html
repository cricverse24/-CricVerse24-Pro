<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CricVerse24</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      width:320px;
      background:#fff;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,.3);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#16a34a;
      color:#fff;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#15803d;
    }

    #msg{
      text-align:center;
      margin-top:15px;
      color:red;
    }
  </style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
