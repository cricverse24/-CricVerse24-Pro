<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricVerse24 Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#16a34a;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:12px 20px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<header>
🏏 CricVerse24 Admin Panel
</header>

<div class="container">

<div class="card">
<h2>Add News</h2>

<input id="title" placeholder="News Title">

<textarea id="content" rows="6" placeholder="News Content"></textarea>

<button id="saveNews">Publish News</button>

</div>

<div class="card">
<h2>Live Match</h2>

<input id="team1" placeholder="Team 1">

<input id="team2" placeholder="Team 2">

<input id="score" placeholder="Live Score">

<button id="saveMatch">Update Match</button>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
